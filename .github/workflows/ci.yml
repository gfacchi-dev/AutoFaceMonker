name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Unit + integration tests (dev install via uv sync) ──────────────────
  test:
    name: Test (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install OpenGL (Linux headless)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libosmesa6 libgl1

      - name: Install project + dev deps
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Simulates: pip install autofacemonker / uv add autofacemonker ────────
  install-test:
    name: Install from wheel (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install OpenGL (Linux headless)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libosmesa6 libgl1

      - name: Build wheel
        run: uv build --wheel

      # Fresh venv with no project source — mirrors `pip install autofacemonker`
      - name: Install into fresh venv and smoke test
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}
        run: |
          uv venv .test-env
          uv pip install autofacemonker --find-links dist/ --python .test-env

          # Cross-platform path to the venv Python
          if [ "$RUNNER_OS" = "Windows" ]; then
            PY=".test-env/Scripts/python"
          else
            PY=".test-env/bin/python"
          fi

          "$PY" -c "import autofacemonker; assert autofacemonker.__version__; print('OK:', autofacemonker.__version__)"
          "$PY" -c "import importlib.resources, os; p=str(importlib.resources.files('autofacemonker.data').joinpath('template.ply')); assert os.path.isfile(p), p; print('data OK')"
          "$PY" -m autofacemonker._cli --help
